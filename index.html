<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>号码提取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .input-area {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .output-area {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            min-height: 60px;
        }

        .output-label {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .result {
            font-size: 1.5em;
            color: #1a1a2e;
            font-weight: 600;
            word-break: break-all;
        }

        .empty {
            color: #ccc;
            font-size: 1em;
        }

        .rules {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .rules h3 {
            font-size: 1em;
            color: #555;
            margin-bottom: 10px;
        }

        .rules ul {
            list-style: none;
            padding: 0;
        }

        .rules li {
            color: #888;
            font-size: 0.9em;
            padding: 5px 0;
            padding-left: 20px;
            position: relative;
        }

        .rules li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #5a6fd6;
        }

        .copy-btn.copied {
            background: #4caf50;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <h1>📞 号码提取工具</h1>
        <p class="subtitle">输入任意文本，自动提取并处理号码</p>

        <div class="input-area">
            <label for="input">输入文本：</label>
            <textarea id="input" placeholder="例如：13476680603
Li Chen
Age 60 • Collinsville, IL"></textarea>
        </div>

        <button class="btn" onclick="extract()">提取号码</button>

        <div class="output-area">
            <div class="output-label">提取结果：</div>
            <div id="result" class="empty">等待输入...</div>
            <button class="copy-btn" id="copyBtn" onclick="copyResult()" style="display:none;">复制结果</button>
        </div>

        <div class="rules">
            <h3>处理规则：</h3>
            <ul>
                <li>从杂乱文本中提取纯数字号码</li>
                <li>去掉号码开头的数字 1</li>
                <li>去掉后面的 ***、??? 等干扰字符</li>
                <li>保持原始数字顺序不变</li>
            </ul>
        </div>
    </div>

    <script>
        function extract() {
            const input = document.getElementById('input').value;
            const resultDiv = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');

            if (!input.trim()) {
                resultDiv.innerHTML = '<span class="empty">请输入内容</span>';
                copyBtn.style.display = 'none';
                return;
            }

            // 提取所有数字
            let numbers = input.replace(/\D/g, '');

            // 如果号码以1开头，去掉开头的1
            if (numbers.startsWith('1')) {
                numbers = numbers.substring(1);
            }

            if (numbers.length === 0) {
                resultDiv.innerHTML = '<span class="empty">未找到号码</span>';
                copyBtn.style.display = 'none';
                return;
            }

            resultDiv.textContent = numbers;
            copyBtn.style.display = 'inline-block';
            copyBtn.textContent = '复制结果';
            copyBtn.classList.remove('copied');
        }

        function copyResult() {
            const result = document.getElementById('result').textContent;
            const copyBtn = document.getElementById('copyBtn');

            navigator.clipboard.writeText(result).then(() => {
                copyBtn.textContent = '已复制 ✓';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制结果';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }

        // 支持回车键提取（Ctrl+Enter）
        document.getElementById('input').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                extract();
            }
        });
    </script>
</body>
</html>
