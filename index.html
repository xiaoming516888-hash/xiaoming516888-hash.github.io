<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>号码提取工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .input-area { margin-bottom: 20px; }
        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            min-height: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            resize: vertical;
            font-family: monospace;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn:hover { opacity: 0.9; }
        .output-section { margin-bottom: 20px; }
        .output-label {
            color: #555;
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .output-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            min-height: 60px;
            border: 2px solid #e0e0e0;
        }
        .output-box pre {
            font-family: monospace;
            font-size: 1.1em;
            color: #1a1a2e;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }
        .empty { color: #ccc; }
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .copy-btn:hover { background: #5a6fd6; }
        .copy-btn.copied { background: #4caf50; }
        .stats {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .two-column { grid-template-columns: 1fr; }
        }
        .format-info {
            background: #f0f0f0;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #666;
        }
        .format-info strong {
            color: #333;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <h1>号码提取工具</h1>
        <p class="subtitle">支持多种格式，自动提取号码和生成问候语</p>

        <div class="format-info">
            <strong>支持格式：</strong><br>
            格式1: 14257533668 / Zhongping Chen / Age 73<br>
            格式2: (732) 208-2725 / Alan Cheng / Wireless<br>
            格式3: 16122039160 * Zhigang Zhang / Westport, CT
        </div>

        <div class="input-area">
            <label>输入文本：</label>
            <textarea id="inputText" placeholder="支持多种格式，粘贴即可"></textarea>
        </div>

        <button class="btn" id="extractBtn">提取号码</button>

        <div id="stats" class="stats"></div>

        <div class="two-column">
            <div class="output-section">
                <div class="output-label">
                    <span>电话号码</span>
                    <button class="copy-btn" id="copyNumbersBtn" style="display:none;">复制</button>
                </div>
                <div class="output-box">
                    <pre id="numbersResult"><span class="empty">等待输入...</span></pre>
                </div>
            </div>

            <div class="output-section">
                <div class="output-label">
                    <span>问候语</span>
                    <button class="copy-btn" id="copyGreetingsBtn" style="display:none;">复制</button>
                </div>
                <div class="output-box">
                    <pre id="greetingsResult"><span class="empty">等待输入...</span></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        var phoneNumbers = [];
        var greetings = [];

        window.onload = function() {
            document.getElementById('extractBtn').onclick = doExtract;
            document.getElementById('copyNumbersBtn').onclick = copyNumbers;
            document.getElementById('copyGreetingsBtn').onclick = copyGreetings;
        };

        function doExtract() {
            var input = document.getElementById('inputText').value;
            var numbersResult = document.getElementById('numbersResult');
            var greetingsResult = document.getElementById('greetingsResult');
            var statsDiv = document.getElementById('stats');
            var copyNumbersBtn = document.getElementById('copyNumbersBtn');
            var copyGreetingsBtn = document.getElementById('copyGreetingsBtn');

            if (!input || input.trim() === '') {
                numbersResult.innerHTML = '<span class="empty">请输入内容</span>';
                greetingsResult.innerHTML = '<span class="empty">请输入内容</span>';
                statsDiv.textContent = '';
                copyNumbersBtn.style.display = 'none';
                copyGreetingsBtn.style.display = 'none';
                return;
            }

            phoneNumbers = [];
            greetings = [];

            // 统一换行符
            var text = input.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            var lines = text.split('\n');

            var i = 0;
            while (i < lines.length) {
                var line = lines[i].trim();
                if (line === '') {
                    i++;
                    continue;
                }

                var result = processEntry(lines, i);
                if (result) {
                    phoneNumbers.push(result.phone);
                    greetings.push(result.greeting);
                    i = result.nextIndex;
                } else {
                    i++;
                }
            }

            if (phoneNumbers.length === 0) {
                numbersResult.innerHTML = '<span class="empty">未找到有效号码，请检查输入格式</span>';
                greetingsResult.innerHTML = '<span class="empty">未找到有效号码</span>';
                statsDiv.textContent = '';
                copyNumbersBtn.style.display = 'none';
                copyGreetingsBtn.style.display = 'none';
                return;
            }

            numbersResult.textContent = phoneNumbers.join('\n');
            greetingsResult.textContent = greetings.join('\n');

            statsDiv.textContent = '共提取 ' + phoneNumbers.length + ' 个号码';
            copyNumbersBtn.style.display = 'inline-block';
            copyGreetingsBtn.style.display = 'inline-block';
            copyNumbersBtn.textContent = '复制';
            copyNumbersBtn.className = 'copy-btn';
            copyGreetingsBtn.textContent = '复制';
            copyGreetingsBtn.className = 'copy-btn';
        }

        // 处理单个条目，支持多种格式
        function processEntry(lines, startIndex) {
            var line = lines[startIndex].trim();
            if (line === '') return null;

            var phone = '';
            var firstName = '';
            var nextIndex = startIndex + 1;

            // 格式1: (732) 208-2725  或  732-208-2725  或 (732)208-2725
            var format1Match = line.match(/^\(?([0-9]{3})\)?[-.\s]?([0-9]{3})[-.\s]?([0-9]{4})$/);
            if (format1Match) {
                phone = format1Match[1] + format1Match[2] + format1Match[3];
                // 下一行是姓名
                if (startIndex + 1 < lines.length) {
                    var nextLine = lines[startIndex + 1].trim();
                    var nameMatch = nextLine.match(/^([A-Za-z]+)\s+([A-Za-z]+)$/);
                    if (nameMatch && nextLine.indexOf('Age') === -1 && nextLine.indexOf('Wireless') === -1 && nextLine.indexOf('/') === -1) {
                        firstName = nameMatch[1];
                        nextIndex = startIndex + 2;
                    }
                }
                if (firstName !== '') {
                    return {
                        phone: phone,
                        greeting: 'Uncle ' + firstName + ' are you there?',
                        nextIndex: nextIndex
                    };
                }
                return null;
            }

            // 格式2: 16122039160 * Zhigang Zhang / Westport, CT  (同一行)
            var format2Match = line.match(/^(1[0-9]{10})\s*[*\s]\s*([A-Za-z]+)\s+([A-Za-z]+)\s*\/\s*.+$/);
            if (format2Match) {
                phone = format2Match[1].substring(1);
                firstName = format2Match[2];
                return {
                    phone: phone,
                    greeting: 'Uncle ' + firstName + ' are you there?',
                    nextIndex: startIndex + 1
                };
            }

            // 格式3: 1开头的11位号码，后面多行有姓名
            var format3Match = line.match(/^1([0-9]{10})$/);
            if (format3Match) {
                phone = format3Match[1];
                // 向后查找姓名
                for (var j = startIndex + 1; j < lines.length && j < startIndex + 5; j++) {
                    var searchLine = lines[j].trim();
                    if (searchLine === '') continue;

                    var nameMatch = searchLine.match(/^([A-Za-z]+)\s+([A-Za-z]+)$/);
                    if (nameMatch) {
                        var candidateFirst = nameMatch[1];
                        var candidateFull = candidateFirst + ' ' + nameMatch[2];
                        if (searchLine.indexOf('Age') === -1 && searchLine.indexOf('Wireless') === -1) {
                            firstName = candidateFirst;
                            nextIndex = j + 1;
                            break;
                        }
                    }
                }
                if (firstName !== '') {
                    return {
                        phone: phone,
                        greeting: 'Uncle ' + firstName + ' are you there?',
                        nextIndex: nextIndex
                    };
                }
                return null;
            }

            return null;
        }

        function copyNumbers() {
            var btn = document.getElementById('copyNumbersBtn');
            var text = phoneNumbers.join('\n');

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showCopied(btn);
                }).catch(function() {
                    fallbackCopy(text, btn);
                });
            } else {
                fallbackCopy(text, btn);
            }
        }

        function copyGreetings() {
            var btn = document.getElementById('copyGreetingsBtn');
            var text = greetings.join('\n');

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showCopied(btn);
                }).catch(function() {
                    fallbackCopy(text, btn);
                });
            } else {
                fallbackCopy(text, btn);
            }
        }

        function fallbackCopy(text, btn) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showCopied(btn);
            } catch (e) {
                alert('复制失败，请手动复制');
            }
            document.body.removeChild(textarea);
        }

        function showCopied(btn) {
            btn.textContent = '已复制';
            btn.className = 'copy-btn copied';
            setTimeout(function() {
                btn.textContent = '复制';
                btn.className = 'copy-btn';
            }, 2000);
        }
    </script>
</body>
</html>
