<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* 头像 */
        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #2d3748;
        }

        .subtitle {
            color: #718096;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        /* 技能标签 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }

        .skill-tag {
            background: #edf2f7;
            color: #4a5568;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        /* 联系方式 */
        .contact {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
        }

        .contact a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.8s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- 头像 -->
            <div class="avatar">我</div>
            
            <h1>Amy</h1>
            <p class="subtitle">PE | 热爱沟通</p>
            
            <p>你好！我是一名热爱沟通的PE。</p>
            
            <!-- 技能标签 -->
            <div class="skills">
                <span class="skill-tag">HTML/CSS</span>
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">React</span>
                <span class="skill-tag">Vue</span>
                <span class="skill-tag">Node.js</span>
            </div>
            
            <!-- 按钮 -->
            <a href="#projects" class="btn">查看作品</a>
            <a href="mailto:zhangsan@example.com" class="btn">联系我</a>
            
            <!-- 联系方式 -->
            <div class="contact">
                <p>📧 zhangsan@example.com</p>
                <p style="margin-top: 15px;">
                    <a href="#">GitHub</a> |
                    <a href="#">LinkedIn</a> |
                    <a href="#">Twitter</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // 简单的交互：点击按钮显示提示
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if (this.getAttribute('href') === '#projects') {
                    e.preventDefault();
                    alert('项目页面正在建设中！');
                }
            });
        });
    </script>
</body>
</html>
