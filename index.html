
html_content = '''<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>号码提取工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .input-area { margin-bottom: 20px; }
        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            resize: vertical;
            font-family: monospace;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn:hover { opacity: 0.9; }
        .output-section { margin-bottom: 20px; }
        .output-label {
            color: #555;
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .output-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            min-height: 60px;
            border: 2px solid #e0e0e0;
        }
        .output-box pre {
            font-family: monospace;
            font-size: 1.1em;
            color: #1a1a2e;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }
        .empty { color: #ccc; }
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .copy-btn:hover { background: #5a6fd6; }
        .copy-btn.copied { background: #4caf50; }
        .stats {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .two-column { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 号码提取工具</h1>
        <p class="subtitle">输入文本，自动提取号码和生成问候语（分开展示）</p>

        <div class="input-area">
            <label for="input">输入文本：</label>
            <textarea id="input" placeholder="例如：\n14257533668\nZhongping Chen\nAge 73 • Bellevue, WA\n14159399439\nWen Sun\nAge 60 • Novato, CA"></textarea>
        </div>

        <button class="btn" onclick="doExtract()">提取号码</button>

        <div id="stats" class="stats"></div>

        <div class="two-column">
            <div class="output-section">
                <div class="output-label">
                    <span>📱 电话号码</span>
                    <button class="copy-btn" id="copyNumbersBtn" onclick="copyNumbers()" style="display:none;">复制</button>
                </div>
                <div class="output-box">
                    <pre id="numbersResult"><span class="empty">等待输入...</span></pre>
                </div>
            </div>

            <div class="output-section">
                <div class="output-label">
                    <span>💬 问候语</span>
                    <button class="copy-btn" id="copyGreetingsBtn" onclick="copyGreetings()" style="display:none;">复制</button>
                </div>
                <div class="output-box">
                    <pre id="greetingsResult"><span class="empty">等待输入...</span></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        var phoneNumbers = [];
        var greetings = [];

        function doExtract() {
            var input = document.getElementById('input').value;
            var numbersResult = document.getElementById('numbersResult');
            var greetingsResult = document.getElementById('greetingsResult');
            var statsDiv = document.getElementById('stats');
            var copyNumbersBtn = document.getElementById('copyNumbersBtn');
            var copyGreetingsBtn = document.getElementById('copyGreetingsBtn');

            if (!input || !input.trim()) {
                numbersResult.innerHTML = '<span class="empty">请输入内容</span>';
                greetingsResult.innerHTML = '<span class="empty">请输入内容</span>';
                statsDiv.textContent = '';
                copyNumbersBtn.style.display = 'none';
                copyGreetingsBtn.style.display = 'none';
                return;
            }

            // 清理输入，统一换行符
            var lines = input.replace(/\\r\\n/g, '\\n').replace(/\\r/g, '\\n').split('\\n');
            
            phoneNumbers = [];
            greetings = [];
            
            var currentPhone = '';
            var currentName = '';

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) continue;

                // 检查是否是11位号码（以1开头）
                var phoneMatch = line.match(/^1\\d{10}$/);
                if (phoneMatch) {
                    // 保存之前的
                    if (currentPhone && currentName) {
                        phoneNumbers.push(currentPhone.substring(1));
                        greetings.push('Uncle ' + currentName + ', is that you?');
                    }
                    currentPhone = line;
                    currentName = '';
                    continue;
                }

                // 检查是否是姓名（纯字母，两个单词）
                if (currentPhone && !currentName) {
                    var nameMatch = line.match(/^([A-Za-z]+\\s+[A-Za-z]+)$/);
                    if (nameMatch && line.indexOf('Age') === -1 && line.indexOf('•') === -1) {
                        currentName = line;
                    }
                }
            }

            // 处理最后一个
            if (currentPhone && currentName) {
                phoneNumbers.push(currentPhone.substring(1));
                greetings.push('Uncle ' + currentName + ', is that you?');
            }

            if (phoneNumbers.length === 0) {
                numbersResult.innerHTML = '<span class="empty">未找到有效号码，请检查输入格式</span>';
                greetingsResult.innerHTML = '<span class="empty">未找到有效号码</span>';
                statsDiv.textContent = '';
                copyNumbersBtn.style.display = 'none';
                copyGreetingsBtn.style.display = 'none';
                return;
            }

            // 显示结果
            numbersResult.textContent = phoneNumbers.join('\\n');
            greetingsResult.textContent = greetings.join('\\n');
            
            statsDiv.textContent = '共提取 ' + phoneNumbers.length + ' 个号码';
            copyNumbersBtn.style.display = 'inline-block';
            copyGreetingsBtn.style.display = 'inline-block';
            copyNumbersBtn.textContent = '复制';
            copyNumbersBtn.className = 'copy-btn';
            copyGreetingsBtn.textContent = '复制';
            copyGreetingsBtn.className = 'copy-btn';
        }

        function copyNumbers() {
            var btn = document.getElementById('copyNumbersBtn');
            var text = phoneNumbers.join('\\n');
            
            navigator.clipboard.writeText(text).then(function() {
                btn.textContent = '已复制';
                btn.className = 'copy-btn copied';
                setTimeout(function() {
                    btn.textContent = '复制';
                    btn.className = 'copy-btn';
                }, 2000);
            }).catch(function() {
                // 备用方案
                var textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '已复制';
                btn.className = 'copy-btn copied';
                setTimeout(function() {
                    btn.textContent = '复制';
                    btn.className = 'copy-btn';
                }, 2000);
            });
        }

        function copyGreetings() {
            var btn = document.getElementById('copyGreetingsBtn');
            var text = greetings.join('\\n');
            
            navigator.clipboard.writeText(text).then(function() {
                btn.textContent = '已复制';
                btn.className = 'copy-btn copied';
                setTimeout(function() {
                    btn.textContent = '复制';
                    btn.className = 'copy-btn';
                }, 2000);
            }).catch(function() {
                var textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '已复制';
                btn.className = 'copy-btn copied';
                setTimeout(function() {
                    btn.textContent = '复制';
                    btn.className = 'copy-btn';
                }, 2000);
            });
        }
    </script>
</body>
</html>'''

output_path = "/mnt/agents/output/number-extractor.html"
with open(output_path, "w", encoding="utf-8") as f:
    f.write(html_content)

print(f"✅ 文件已修复: {output_path}")
print(f"文件大小: {len(html_content)} 字符")
